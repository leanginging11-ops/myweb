<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/form.css">
</head>

</head>

<body>
    <center>
        <table border="1">
         <tr class="one">
            <td colspan="2">Pizza Shop2.0</td>
            </tr>
            <tr class="two">
                <td>Name:</td>
                <td><input type="text" placeholder="Enter your name"></td>
            </tr>
            <tr>
                <td>Pizza Toppings:</td>
                <td>
                    <input type="radio">
                    <label for="">Supreme</label><br>
                    <input type="radio">
                    <label for="">Vegterian</label><br>
                    <input type="radio">
                    <label for="">Hawaiian</label><br>
                </td>
            </tr>
            <tr>
                <td>Pizza Size:</td>
                <td><select name="" id="">
                        <option>small</option>
                        <option>Big</option>
                        <option>Medium</option>
                    </select></td>
            </tr>
            <tr>
                <td>Optinal Extras:</td>
                <td>
                    <input type="checkbox">Extra Cheese
                    <input type="checkbox">Green Peppers
                </td>
            </tr>
            <tr><td colspan="2">Delivery Instructions: <br>
                <textarea></textarea>
            </td>
            </tr>
            <tr class="sev">
                <td colspan="2"><button>Send order</button></td>
            </tr>
        </table>
    </center>
</body>

</html>
