<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<h1>Switch statement</h1>
<body>
    <script>
        let user =prompt("Enter your role");
        switch(user){
            case "admin":
                document.write("you are admin");
                break;
            case "editor":
                document.write("you are editor");
                  break;
            case "user":
                document.write("you are user");
                  break;
            default:
            document.write("invalid role.pls enter admin editor or user")
        }
      
    </script>
</body>
</html>
